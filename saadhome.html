<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saad Ahemad - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: url('homeback.jpg') center/cover fixed;
            color: #c7b7a3;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Dark overlay for readability */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        /* Main container */
        .container {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            min-height: calc(100vh - 200px);
        }

        /* Center Title */
        .center-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
        }

        .welcome-text {
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #c7b7a3;
            opacity: 0;
            animation: fadeInDown 1s ease forwards;
        }

        .name-title {
            font-size: 64px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #b88a2c, #c7b7a3, #b88a2c);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite, fadeIn 1.5s ease forwards;
            text-shadow: 0 0 20px rgba(184, 138, 44, 0.5);
            opacity: 0;
            animation-delay: 0.5s;
        }

        .subtitle {
            font-size: 16px;
            letter-spacing: 3px;
            margin-top: 15px;
            color: #c7b7a3;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1s;
        }

        @keyframes glow {
            0%, 100% {
                background-position: 0% 50%;
                filter: brightness(1) drop-shadow(0 0 20px rgba(184, 138, 44, 0.6));
            }
            50% {
                background-position: 100% 50%;
                filter: brightness(1.2) drop-shadow(0 0 30px rgba(184, 138, 44, 0.8));
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Left and Right Navigation */
        .nav-section {
            z-index: 2;
            opacity: 0;
            animation: slideIn 1s ease forwards;
        }

        .nav-left {
            text-align: left;
            animation-delay: 0.8s;
        }

        .nav-right {
            text-align: right;
            animation-delay: 1s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .nav-section h3 {
            font-size: 24px;
            color: #b88a2c;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-link {
            display: block;
            font-size: 20px;
            color: #c7b7a3;
            text-decoration: none;
            margin: 20px 0;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #b88a2c, #561c24);
            transition: width 0.4s ease;
        }

        .nav-right .nav-link::before {
            left: auto;
            right: 0;
        }

        .nav-link:hover {
            color: #b88a2c;
            text-shadow: 0 0 15px rgba(184, 138, 44, 0.8);
            transform: translateX(10px);
        }

        .nav-right .nav-link:hover {
            transform: translateX(-10px);
        }

        .nav-link:hover::before {
            width: 100%;
        }

        /* Footer */
        footer {
            /* changed to a softer dark slate color for better contrast */
            background: rgba(40, 44, 52, 0.95);
            padding: 40px 8%;
            border-top: 2px solid #b88a2c;
        }

        .footer-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-section h3 {
            color: #b88a2c;
            font-size: 20px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(199, 183, 163, 0.1);
            border: 2px solid #b88a2c;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            background: rgba(184, 138, 44, 0.2);
            border-color: #c7b7a3;
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(184, 138, 44, 0.4);
        }

        .social-icon svg {
            width: 22px;
            height: 22px;
            fill: #c7b7a3;
        }

        /* Feedback Form */
        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feedback-form textarea {
            background: rgba(199, 183, 163, 0.1);
            border: 2px solid #b88a2c;
            border-radius: 8px;
            padding: 15px;
            color: #c7b7a3;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            transition: all 0.3s ease;
        }

        .feedback-form textarea:focus {
            outline: none;
            border-color: #561c24;
            box-shadow: 0 0 15px rgba(184, 138, 44, 0.3);
        }

        .feedback-form textarea::placeholder {
            color: rgba(199, 183, 163, 0.5);
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #b88a2c;
        }

        .submit-btn {
            background: linear-gradient(135deg, #561c24, #b88a2c);
            color: #c7b7a3;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: flex-start;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(184, 138, 44, 0.5);
            filter: brightness(1.2);
        }

        /* Copyright */
        .copyright {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(184, 138, 44, 0.3);
            color: #c7b7a3;
            font-size: 14px;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .name-title {
                font-size: 48px;
            }

            .container {
                padding: 0 5%;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                justify-content: center;
                gap: 40px;
                padding-top: 100px;
            }

            .center-title {
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                margin-bottom: 50px;
            }

            .name-title {
                font-size: 36px;
            }

            .nav-section {
                text-align: center;
            }

            .nav-right {
                text-align: center;
            }

            .nav-link::before {
                left: 50% !important;
                transform: translateX(-50%);
            }

            .footer-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }
    </style>

    <script>
        // Character/Word counter for feedback
        function updateCharCount() {
            const textarea = document.getElementById('feedback');
            const charCount = document.getElementById('charCount');
            const words = textarea.value.trim().split(/\s+/).filter(word => word.length > 0);
            const wordCount = words.length;
            
            charCount.textContent = `${wordCount} / 50 words`;
            
            if (wordCount > 50) {
                charCount.style.color = '#561c24';
            } else {
                charCount.style.color = '#b88a2c';
            }
        }

        // Handle feedback submission
        function handleFeedback(event) {
            event.preventDefault();
            const textarea = document.getElementById('feedback');
            const words = textarea.value.trim().split(/\s+/).filter(word => word.length > 0);
            
            if (words.length === 0) {
                alert('Please write some feedback before submitting.');
                return;
            }
            
            if (words.length > 50) {
                alert('Please limit your feedback to 50 words.');
                return;
            }
            
            // Here you can add code to send feedback to a database or email
            // For now, we'll just show a success message
            alert('Thank you for your feedback! It has been received.');
            textarea.value = '';
            updateCharCount();
        }

        // Smooth scroll for internal links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
